services:
  postgres:
    image: postgres:18.3
    container_name: ${SERVICE_NAME}-postgres-prod
    restart: unless-stopped
    shm_size: 256mb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_INITDB_ARGS: '--encoding=UTF-8 --locale=C.UTF-8'
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.6.2
    container_name: ${SERVICE_NAME}-redis-prod
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD}', '--appendonly', 'yes']
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
    image: ${SERVICE_NAME}-api:prod
    container_name: ${SERVICE_NAME}-api-prod
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
    expose:
      - '3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/health/liveness >/dev/null || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: ${SERVICE_NAME}-nginx-prod
    restart: unless-stopped
    ports:
      - '${NGINX_HOST_PORT}:80'
      # Uncomment after TLS is configured
      # - '${NGINX_HOST_PORT_TLS}:443'
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment when adding TLS via certbot:
      # - certbot-conf:/etc/letsencrypt:ro
      # - certbot-www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy

  migrate:
    build:
      context: .
      target: build
    image: ${SERVICE_NAME}-migrate:prod
    env_file: .env.production
    environment:
      DB_HOST: postgres
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
    command: ['yarn', 'prisma:deploy']
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ['migrate']

volumes:
  postgres-data:
    name: ${SERVICE_NAME}-postgres-prod-data
  redis-data:
    name: ${SERVICE_NAME}-redis-prod-data
