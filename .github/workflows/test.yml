name: Test

# Reusable + PR-triggered. Deploy workflows call this via `uses:` to gate
# merges; PR events trigger it directly against the target branch.
on:
  pull_request:
    branches:
      - main
      - staging
      - develop
  # Makes this workflow callable from other workflows as
  # `jobs.<name>.uses: ./.github/workflows/test.yml`. Needed by the
  # deploy-production / deploy-staging workflows that gate their deploys
  # on a passing test run. No `inputs` or `secrets` are declared — the
  # env vars below are CI-only constants, not repo secrets.
  workflow_call:

# Cancel in-flight runs of this workflow for the same ref. Avoids two
# concurrent CI runs on rapid pushes; the newer commit wins.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default. Only read access to the repo. Individual jobs
# can escalate if they ever need to (e.g., to push images to GHCR).
permissions:
  contents: read

jobs:
  ci:
    name: Lint, build, test
    runs-on: ubuntu-latest
    # Bounded so a hung job can't burn billable minutes. 15 min is ~3x
    # the normal green run, plenty of headroom for flaky DB starts.
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18.3
        env:
          POSTGRES_USER: nestjs
          POSTGRES_PASSWORD: ci-postgres-password
          POSTGRES_DB: nestjs_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nestjs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      # Required for the JWT logout blocklist (src/common/redis). Without
      # it, /auth/logout tests can't write to Redis. Image is pinned to
      # match the docker-compose dev version; no auth (ci-only).
      redis:
        image: redis:8.6.2
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      PORT: 3001
      SERVICE_NAME: nestjs
      DB_USER: nestjs
      DB_PASSWORD: ci-postgres-password
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: nestjs_test
      DATABASE_URL: postgresql://nestjs:ci-postgres-password@localhost:5432/nestjs_test?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # The CI Redis service has no auth (no --requirepass), so this
      # password is just a placeholder to satisfy the Joi .min(16) validation.
      # The connection URL below intentionally omits any auth segment.
      REDIS_PASSWORD: ci-redis-password-not-actually-used
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-jwt-secret-not-for-production-use-only-for-testing
      JWT_EXPIRES_IN: 1h
      EMAIL_PROVIDER: stub
      CORS_ORIGIN: '*'
      THROTTLE_TTL_MS: 60000
      THROTTLE_LIMIT: 100

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --silent
        env:
          # Suppress Node's "DEP0169 url.parse" warning emitted by
          # yarn 1.x itself — yarn-internal, no upstream fix available.
          NODE_OPTIONS: --no-deprecation

      - name: Generate Prisma client
        run: yarn prisma:generate

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Unit tests
        run: yarn test --passWithNoTests

      - name: E2E tests
        run: yarn test:e2e

      # The application refuses to boot when the permission catalog in the code
      # and the rows in the database disagree. Catch that here, on a throwaway
      # database, rather than at deploy time when the healthcheck would fail and
      # the old container is already stopped.
      #
      # `rbac:sync` projects the catalog; `rbac:check` then asserts the two match
      # in BOTH directions (nothing missing, no orphans). Exits non-zero on drift.
      - name: Authorization catalog is in sync
        env:
          DATABASE_URL: postgresql://nestjs:ci-postgres-password@localhost:5432/nestjs_rbac_ci?schema=public
          DB_NAME: nestjs_rbac_ci
        run: |
          PGPASSWORD=ci-postgres-password psql -h localhost -U nestjs -d postgres \
            -c "DROP DATABASE IF EXISTS nestjs_rbac_ci;" -c "CREATE DATABASE nestjs_rbac_ci;"
          yarn prisma:deploy
          yarn rbac:sync
          yarn rbac:check

      # Informational: lists everything moderate and above. Never fails.
      # Known moderate: `uuid` via `resend > svix > uuid` (CVE fixed in
      # uuid >= 14.0.0, but uuid 11+ is ESM-only and breaks the CJS
      # `require` path svix uses — can't bump until svix updates upstream).
      - name: Dependency audit (informational)
        run: yarn audit --level moderate || true

      # yarn 1.x's `--level` flag only filters the printed table; the
      # exit code is still a bitmask of ALL severities found (1=info,
      # 2=low, 4=moderate, 8=high, 16=critical). A single moderate
      # finding → exit 4 even with `--level high`. Guard with a shell
      # check that only fails on exit codes with the high (8) or
      # critical (16) bit set, i.e. exit code >= 8.
      - name: Dependency audit (blocks on high+)
        run: yarn audit --level high || test $? -lt 8

  docker:
    name: Build & scan container image
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: nestjs-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Trivy scans the built image for CVEs in OS packages and node modules.
      # Fails on HIGH or CRITICAL; MEDIUM is reported but non-blocking.
      # `ignore-unfixed: true` skips CVEs with no available patch so the
      # build doesn't red-light on findings you literally cannot fix.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: nestjs-api:ci
          format: table
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
