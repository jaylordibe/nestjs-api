# Staging nginx config — served from inside the docker compose network.
# `api` is the service name from docker-compose.staging.yml, port 3000 is the
# API's internal listen port. nginx resolves `api` via Docker's embedded DNS.

upstream nestjs_api {
  server api:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;  # accept any hostname; replace with your real domain in prod

  client_max_body_size 10M;

  # Required for certbot's HTTP-01 challenge once you turn on TLS.
  # location /.well-known/acme-challenge/ { root /var/www/certbot; }

  location / {
    proxy_pass http://nestjs_api;
    proxy_http_version 1.1;

    # Standard reverse-proxy headers — required for the API to see real
    # client IP via TRUST_PROXY=1 (throttler, audit logs).
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support (harmless on HTTP-only endpoints).
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    # Reasonable timeouts for a CRUD API. Bump if you have long-poll/SSE
    # endpoints that need to stay open longer.
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;
  }
}

