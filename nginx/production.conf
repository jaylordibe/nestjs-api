# Production nginx config — served from inside the docker compose network.
# `api` is the service name from docker-compose.production.yml, port 3000 is
# the API's internal listen port. nginx resolves `api` via Docker's embedded DNS.

upstream nestjs_api {
  server api:3000;
}

server {
  listen 80;
  listen [::]:80;
  server_name _;  # replace with your real domain after TLS is set up

  client_max_body_size 5M;

  # location /.well-known/acme-challenge/ { root /var/www/certbot; }

  location / {
    proxy_pass http://nestjs_api;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;
  }
}

